<div class="tab">
  <button class="tablinks" onclick="openConference(event, 'West')">West</button>
  <button class="tablinks" onclick="openConference(event, 'East')">East</button>
  <button class="tablinks" onclick="openConference(event, 'Playoffs')">Playoffs</button>
  </div>
  
<div id="West" class="tabcontent">
  <h3>Western Conference</h3>
  <img src ="images/Western Conference.png" alt="Western Conference Standings">
</div>

<div id="East" class="tabcontent">
  <h3>Eastern Conference</h3>
  <img src ="images/Eastern Conference.png" alt="Eastern Conference Standings">
</div>

<div id="Playoffs" class="tabcontent">
  <h3>NBA Playoffs</h3>
  <img src ="images/NBA Playoff Bracket.png" alt="Western Conference Standings">
</div>

<script>
function openConference(evt, conferenceName) {
  var i, tabcontent, tablinks;
  tabcontent = document.getElementsByClassName("tabcontent");
  for (i = 0; i < tabcontent.length; i++) {
    tabcontent[i].style.display = "none";
  }
  tablinks = document.getElementsByClassName("tablinks");
  for (i = 0; i < tablinks.length; i++) {
    tablinks[i].className = tablinks[i].className.replace(" active", "");
  }
  document.getElementById(conferenceName).style.display = "block";
  evt.currentTarget.className += " active";
}
</script>
