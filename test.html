<!-- UPCOMING GAMES -->
<div class="upcoming">
  <div class="upcomingtitle">Upcoming 🗓️</div>

  <div class="game" data-team="warriors magic">

  <div class="game" data-team="nuggets heat">

    <img src="images/nba logos/Cleveland_Cavaliers.png">
  </div>
</div>

<!-- 🔍 SEARCH SCRIPT -->
<script>
const searchInput = document.getElementById("searchInput");
const searchBtn = document.getElementById("searchBtn");
const games = document.querySelectorAll(".game");

function searchTeams() {
  let value = searchInput.value.toLowerCase();

  games.forEach(game => {
    let teams = game.getAttribute("data-team");

    if (teams.includes(value)) {
      game.style.display = "flex"; // change to "block" if needed
    } else {
      game.style.display = "none";
    }
  });
}

// Click button
searchBtn.addEventListener("click", searchTeams);

// Press Enter
searchInput.addEventListener("keypress", function(e) {
  if (e.key === "Enter") {
    searchTeams();
  }
});

// (optional) live typing
searchInput.addEventListener("keyup", searchTeams);
</script>
