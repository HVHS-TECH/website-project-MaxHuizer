<!-- SLIDER SCRIPT -->
<script>
let slideIndex = 1;
showSlides(slideIndex);

function plusSlides(n) {
  showSlides(slideIndex += n);
}

function showSlides(n) {
  let slides = document.getElementsByClassName("mySlides");

  if (n > slides.length) {slideIndex = 1}
  if (n < 1) {slideIndex = slides.length}

  for (let i = 0; i < slides.length; i++) {
    slides[i].style.display = "none";
  }

  slides[slideIndex - 1].style.display = "block";
}
</script>

<!-- HIGHLIGHT AUTO SLIDE -->
<script>
let highlightIndex = 0;
showHighlightSlides();

function showHighlightSlides() {
  let slides = document.getElementsByClassName("highlight");

  for (let i = 0; i < slides.length; i++) {
    slides[i].style.display = "none";
  }

  highlightIndex++;
  if (highlightIndex > slides.length) {
    highlightIndex = 1;
  }

  slides[highlightIndex - 1].style.display = "block";

  setTimeout(showHighlightSlides, 3000);
}
</script>

<!-- 🔍 SEARCH SCRIPT -->
<script>
const searchInput = document.getElementById("searchInput");
const games = document.querySelectorAll(".game");

searchInput.addEventListener("keyup", function () {
  let value = this.value.toLowerCase();

  games.forEach(game => {
    let teams = game.getAttribute("data-team");

    if (teams.includes(value)) {
      game.style.display = "flex"; // change to block if needed
    } else {
      game.style.display = "none";
    }
  });
});
</script>
