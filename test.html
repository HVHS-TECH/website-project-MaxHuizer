<script>
let slideIndex = 1;
showSlides(slideIndex);

function plusSlides(n) {
  showSlides(slideIndex += n);
}

function currentSlide(n) {
  showSlides(slideIndex = n);
}

function showSlides(n) {
  let i;
  let slides = document.getElementsByClassName("mySlides");
  if (n > slides.length) {slideIndex = 1}    
  if (n < 1) {slideIndex = slides.length}
  for (i = 0; i < slides.length; i++) {
    slides[i].style.display = "none";  
  }
  slides[slideIndex-1].style.display = "block";  
}
</script>

<script>
let performanceIndex = 0;
showPerformanceSlides();

function showPerformanceSlides() {
  let i;
  let slides = document.getElementsByClassName("performanceSlides");
  for (i = 0; i < slides.length; i++) {
    slides[i].style.display = "none";  
  }
  performanceIndex++;
  if (performanceIndex > slides.length) {performanceIndex = 1}    
  slides[performanceIndex - 1].style.display = "block";  
  setTimeout(showPerformanceSlides, 3750);
}
</script>
