<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
<style>

ul {
  list-style-type: none;
  margin: 0;
  padding: 0;
  overflow: hidden;
  background-color: #333333;
}

ul li {
  float: left;
}
ul li a {
  display: block;
  color: #f2c026;
  text-align: center;
  padding: 14px 16px;
  text-decoration: none;
}

ul li a:hover {
  background-color: #111111;
}

.navbar{
  display: grid;
  background-color: #383836;
  grid-template-columns: 1fr 6fr 1fr;
  padding: 10px;
  gap: 10px;
}

.navbar div{
  padding: 10px;
  font-size: 30px;
  text-align: center;
  align-items: center;
}

.Logo1{
grid-column: span 1;
}

.Logo1 img {
  width:auto;
  height:50px;
}

.navbarlinks {
grid-column: span 1;
}

.dropdown {
  float: left;
  overflow: hidden;
}

.dropdown .dropbtn {
  font-size: 16px;  
  border: none;
  outline: none;
  color: white;
  padding: 14px 16px;
  background-color: inherit;
  font-family: inherit;
  margin: 0;
}

.dropdown-content {
  display: none;
  position: absolute;
  background-color: #f9f9f9;
  min-width: 160px;
  box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
  z-index: 1;
}

.dropdown-content a {
  float: none;
  color: black;
  padding: 12px 16px;
  text-decoration: none;
  display: block;
  text-align: left;
}

.dropdown-content a:hover {
  background-color: #ddd;
}

.dropdown:hover .dropdown-content {
  display: block;
}
</style>
</head>
</body>

<div class="navbar">
  <div class="Logo1"><img src="images/website logo.png" alt="NBA Logo"></div>
  <div class="navbarlinks">
  <ul>
  <li><a href="index.html">Home</a></li>
  <li><a href="News.html">News</a></li>
  <li><a href="Results.html">Results</a></li>
  <li><a href="highlights.html">Highlights</a></li>
  
  <li><a href="trades.html">Trades</a></li>
  <li><a href="test.html">test</a></li>
  </ul>
</div>

  <div class="NBAlogo"> <img src="images/NBA.png" alt="NBA Logo"></div>

  <div class="searchbar">
    <input type="text" placeholder="Search">
    <button>🔍</button></div>
</div>

<h3>Dropdown Menu inside a Navigation Bar</h3>
<p>Hover over the "Dropdown" link to see the dropdown menu.</p>

</body>
</html>
