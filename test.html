<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Max's basketball website</title>
    <link rel="icon" type="image/png" href="images/website logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
</head>
<body>

<style>

.container2{
  display: grid;
  grid-template-columns: 1fr 4fr 1fr;
  grid-template-rows: auto auto auto;
  padding: 10px;
  gap: 10px;
}

.container2 div{
  background-color: #383836;
  padding: 50px;
  font-size: 30px;
  text-align: center;
  height: 200px;
}

.slideshow-container {
    width: auto;
    padding: 10px;
}

.mySlides {
    display: none;
}

.games-container {
    display: grid;
    grid-template-columns: auto auto auto;
    gap: 10px;
}

.game {
    display: grid;
    grid-template-columns: auto auto auto;
    align-items: center;
    justify-items: center;
    gap: 10px;
    padding: 10px;
    background-color: #383836;
    border-radius: 6px;
    font-size: 25px;
}

.games-container img {
    width: 80px;
    height: auto;
}

.date-bar {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 20px;
    margin-bottom: 10px;
}

.prev {
    cursor: pointer;
    font-size: 30px;
    user-select: none;
}

.next {
cursor: pointer;
    font-size: 30px;
    user-select: none;
}
</style>

<div class="navbar">
  <div class="Logo1"><img src="images/website logo.png" alt="NBA Logo"></div>
  <div class="navbarlinks">
  <ul>
  <li><a href="index.html">Home</a></li>
  <li><a href="News.html">News</a></li>
  <li><a href="Results.html">Results</a></li>
  <li><a href="highlights.html">Highlights</a></li>
  <li><a href="trades.html">Trades</a></li>
  </ul>
</div>

<div class="searchbar">
    <input type="text" placeholder="Search">
    <button>🔍</button></div>
</div>

</div>
 
<div class="container2">
  <div class="TEXT">
    <div class="home-slide">
        <div class="homepages">
            <div class="prev" onclick="plusSlides(-1)">❮</div>
            <div class="next" onclick="plusSlides(1)">❯</div>
        </div>
        <div class="games-container">
            <img src="images/HOF.png" alt="hall of fame">
        </div>
    </div>

    <div class="mySlides">
        <div class="date-bar">
            <div class="prev" onclick="plusSlides(-1)">❮</div>
            <div class="next" onclick="plusSlides(1)">❯</div>
        </div>
        <div class="games-container">
            <div class="game"><img src="images/nba logos/Los_Angeles_Clippers.png" alt="LA Clippers"> 115 - 119 <img src="images/nba logos/spurs.png" alt="San Antonio Spurs"></div>
        </div>
    </div>
  </div>
  </div>

<script>
let slideIndex = 1;
showSlides(slideIndex);

function plusSlides(n) {
    showSlides(slideIndex += n);
}

function showSlides(n) {
    let slides = document.getElementsByClassName("mySlides");
    if (n > slides.length) slideIndex = 1;
    if (n < 1) slideIndex = slides.length;
    for (let i = 0; i < slides.length; i++) slides[i].style.display = "none";
    slides[slideIndex-1].style.display = "block";
}
</script>
