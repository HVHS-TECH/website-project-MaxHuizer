<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NBA Teams</title>
<style>
  body { font-family: Arial, sans-serif; padding: 20px; }
  nav { margin-bottom: 20px; }
  select { font-size: 16px; padding: 5px; }
  .team-content { border: 1px solid #ccc; padding: 20px; border-radius: 8px; }
</style>
</head>
<body>

<nav>
  <label for="team-select">Select a Team: </label>
  <select id="team-select">
    <option value="">-- Choose a team --</option>
    <option value="lakers">Los Angeles Lakers</option>
    <option value="celtics">Boston Celtics</option>
    <option value="warriors">Golden State Warriors</option>
    <option value="bucks">Milwaukee Bucks</option>
    <option value="nets">Brooklyn Nets</option>
    <!-- add more teams here -->
  </select>
</nav>

<div class="team-content" id="team-content">
  <h2>Pick a team to see info</h2>
  <p>Team info will show here when you select from the dropdown.</p>
</div>

<script>
  const teamContent = document.getElementById('team-content');
  const teamSelect = document.getElementById('team-select');

  // Basic team data (expand as needed)
  const teams = {
    lakers: {
      name: "Los Angeles Lakers",
      star: "LeBron James",
      stadium: "Crypto.com Arena",
      color: "#552583",
    },
    celtics: {
      name: "Boston Celtics",
      star: "Jayson Tatum",
      stadium: "TD Garden",
      color: "#007A33"
    },
    warriors: {
      name: "Golden State Warriors",
      star: "Stephen Curry",
      stadium: "Chase Center",
      color: "#1D428A"
    },
    bucks: {
      name: "Milwaukee Bucks",
      star: "Giannis Antetokounmpo",
      stadium: "Fiserv Forum",
      color: "#00471B"
    },
    nets: {
      name: "Brooklyn Nets",
      star: "Kevin Durant",
      stadium: "Barclays Center",
      color: "#000000"
    }
  };

  teamSelect.addEventListener('change', () => {
    const teamKey = teamSelect.value;
    if (!teamKey) {
      teamContent.innerHTML = `<h2>Pick a team to see info</h2><p>Team info will show here when you select from the dropdown.</p>`;
      return;
    }
    const team = teams[teamKey];
    teamContent.innerHTML = `
      <h2 style="color:${team.color}">${team.name}</h2>
      <p><strong>Star Player:</strong> ${team.star}</p>
      <p><strong>Stadium:</strong> ${team.stadium}</p>
      <p><strong>Logo:</strong> ${team.logo}</p>
    `;
  });
</script>

</body>
</html>
