<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Max's basketball website</title>
<link rel="icon" type="image/png" href="images/website logo.png">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Bebas Neue', sans-serif;
}

.navbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background-color: #1c1c1c;
  padding: 0 20px;
}

.Logo1 img {
  height: 50px;
}

.navbarlinks ul {
  display: flex;
  align-items: center;
  list-style: none;
  margin: 0;
  padding: 0;
}

.navbarlinks li {
  position: relative;
}

.navbarlinks a,
.dropbtn {
  display: block;
  padding: 15px 20px;
  color: white;
  text-decoration: none;
  cursor: pointer;
  font-size: 16px; /* same size as original index */
}

.navbarlinks a:hover,
.dropbtn:hover {
  background-color: #f2c026;
}

.dropdown {
  position: relative;
}

.dropdown-content {
  display: none;
  position: absolute;
  top: 100%;
  left: 0;
  background-color: #f9f9f9;
  min-width: 150px;
}

.dropdown-content a {
  display: block;
  color: black;
  padding: 12px 16px;
  text-decoration: none;
}

.dropdown-content a:hover {
  background-color: #ddd;
}

.dropdown:hover .dropdown-content {
  display: block;
}

.searchbar {
  display: flex;
  align-items: center;
}

.searchbar input {
  padding: 5px;
}

.searchbar button {
  padding: 5px;
  cursor: pointer;
}

.container2{
  display: grid;
  grid-template-columns: 1fr 4fr 1fr;
  gap: 10px;
  padding: 10px;
}

.container2 div{
  background-color: #383836;
  padding: 50px;
  font-size: 30px;
  text-align: center;
  height: 200px;
  color: white;
}

footer {
  text-align: center;
  padding: 20px;
  background-color: #1c1c1c;
  color: white;
}
</style>
</head>
<body>

<div class="navbar">

  <div class="Logo1">
    <img src="images/website logo.png" alt="NBA Logo">
  </div>

  <div class="navbarlinks">
    <ul>
      <li><a href="index.html">Home</a></li>

      <li class="dropdown">
        <div class="dropbtn">News</div>
        <div class="dropdown-content">
          <a href="News.html">News</a>
          <a href="trades.html">Trades</a>
        </div>
      </li>

      <li><a href="Results.html">Results</a></li>
      <li><a href="highlights.html">Highlights</a></li>
      <li><a href="test.html">Test</a></li>
    </ul>
  </div>

  <div class="searchbar">
    <input type="text" placeholder="Search">
    <button>🔍</button>
  </div>

</div>

<div class="container2">
  <div class="TEXT">NBA </div>
  <div class="lefttexts">left text</div>
  <div class="bigimage">big image</div>
  <div class="righttexts">right text</div>
</div>

<footer> 
  © Max Huizer 2026
</footer>

</body>
</html>
